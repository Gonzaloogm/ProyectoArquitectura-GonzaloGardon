<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lista de servicios</title>
</head>

<body>
    <h1>Servicios del taller</h1>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
            </tr>
        </thead>
        <tbody>
            {% for servicio in servicios %}
                <tr>
                    <td>{{ servicio.id }}</td>
                    <td>{{ servicio.nombre }}</td>
                    <td>{{ servicio.descripcion }}</td>
                </tr>
            {% endfor %}
            
        </tbody>
    </table>
    <a href="{% url 'nuevo_servicio' %}">Añadir nuevo servicio</a>
</body>

</html>
