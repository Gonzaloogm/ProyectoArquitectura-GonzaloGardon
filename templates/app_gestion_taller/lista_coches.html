<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lista de coches</title>
</head>

<body>
    <h1>Coches  del taller</h1>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Matrícula</th>
            </tr>
        </thead>
        <tbody>
            {% for coche in coches %}
                <tr>
                    <td>{{ coche.id }}</td>
                    <td>{{ coche.marca }}</td>
                    <td>{{ coche.modelo }}</td>
                    <td>{{ coche.matricula }}</td>
                </tr>
            {% endfor %}
            
        </tbody>
    </table>
    <a href="{% url 'nuevo_coche' %}">Añadir nuevo coche</a>
</body>

</html>
